# tmux configuration

# --- Terminal / True color ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",ghostty:Tc,alacritty:Tc,xterm-kitty:Tc,xterm-256color:Tc"

# --- General ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 10
set -g focus-events on
set -g set-clipboard on

# --- Prefix (default Ctrl+b) ---
# Keeping default to avoid conflict with zsh emacs-mode Ctrl+a

# --- Splits ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Vi-mode pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode (vi) ---
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# --- fzf session switcher ---
bind f display-popup -E -w 60% -h 60% \
  "tmux list-sessions -F '#{session_name}' | fzf --reverse --header='Switch session' | xargs -r tmux switch-client -t"

# --- Status bar ---
set -g status-position top
set -g status-interval 30
set -g status-left " #S "
set -g status-left-length 30
set -g status-right " %H:%M "
set -g status-right-length 20
set -g status-justify left
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# --- TPM (Tmux Plugin Manager) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Plugin settings
set -g @continuum-restore 'on'
set -g @resurrect-dir "$HOME/.local/share/tmux/resurrect"
set -g @yank_action 'copy-pipe-and-cancel'

# --- Theme (sourced from omarchy, graceful if missing) ---
source-file -q ~/.config/omarchy/current/theme/tmux.conf

# Initialize TPM (keep at bottom)
run "$HOME/.local/share/tmux/plugins/tpm/tpm"
